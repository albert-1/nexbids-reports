<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexBids数据监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #10b981;
            --dark-color: #1e293b;
            --light-color: #f8fafc;
        }
        
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
        }
        
        .sidebar {
            background: linear-gradient(180deg, var(--dark-color) 0%, #0f172a 100%);
            color: white;
            min-height: 100vh;
            position: fixed;
            width: 280px;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }
        
        .sidebar .nav-link {
            color: #cbd5e1;
            padding: 12px 20px;
            margin: 5px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: rgba(59, 130, 246, 0.2);
            color: white;
        }
        
        .sidebar .nav-link i {
            width: 24px;
            margin-right: 10px;
        }
        
        .main-content {
            margin-left: 280px;
            padding: 20px;
        }
        
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .card-header {
            background-color: white;
            border-bottom: 2px solid #e2e8f0;
            font-weight: 600;
            padding: 15px 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-card .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        
        .filter-section {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .time-range-btn {
            border-radius: 20px;
            padding: 8px 20px;
            margin: 0 5px;
        }
        
        .chart-container {
            height: 400px;
            position: relative;
        }
        
        .data-table {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .data-table th {
            background-color: #f8fafc;
            font-weight: 600;
            border-top: none;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .badge-pill {
            border-radius: 20px;
            padding: 5px 12px;
        }
        
        .progress {
            height: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="p-4">
            <div class="d-flex align-items-center mb-4">
                <div class="bg-white rounded-circle p-2 me-3">
                    <i class="bi bi-bar-chart-fill text-primary" style="font-size: 1.5rem;"></i>
                </div>
                <div>
                    <h3 class="h5 mb-0">NexBids</h3>
                    <small class="text-light">数据监控系统</small>
                </div>
            </div>
            
            <hr class="bg-light my-4">
            
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="#dashboard" onclick="showSection('dashboard')">
                        <i class="bi bi-speedometer2"></i> 仪表盘
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#hourly" onclick="showSection('hourly')">
                        <i class="bi bi-clock"></i> 小时级数据
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#weekly" onclick="showSection('weekly')">
                        <i class="bi bi-calendar-week"></i> 周报数据
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#advertisers" onclick="showSection('advertisers')">
                        <i class="bi bi-building"></i> 广告主分析
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#campaigns" onclick="showSection('campaigns')">
                        <i class="bi bi-megaphone"></i> 活动分析
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#settings" onclick="showSection('settings')">
                        <i class="bi bi-gear"></i> 系统设置
                    </a>
                </li>
            </ul>
            
            <div class="position-absolute bottom-0 start-0 w-100 p-4">
                <div class="card bg-dark border-0">
                    <div class="card-body p-3">
                        <small class="d-block text-light mb-1">最后更新</small>
                        <div class="d-flex justify-content-between align-items-center">
                            <span id="last-update" class="text-light">--:--:--</span>
                            <span class="badge bg-success badge-pill">在线</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航 -->
        <nav class="navbar navbar-light bg-white rounded-3 shadow-sm mb-4">
            <div class="container-fluid">
                <div class="d-flex align-items-center">
                    <h2 class="h4 mb-0" id="page-title">仪表盘</h2>
                </div>
                <div class="d-flex align-items-center">
                    <div class="input-group me-3" style="width: 300px;">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-0" placeholder="搜索数据...">
                    </div>
                    <button class="btn btn-outline-primary me-2" onclick="refreshData()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                    <div class="dropdown">
                        <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-download"></i> 导出
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="exportData('csv')">CSV格式</a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportData('excel')">Excel格式</a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportData('pdf')">PDF报告</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
        
        <!-- 仪表盘内容 -->
        <div id="dashboard-section" class="section-content">
            <!-- 关键指标卡片 -->
            <div class="row mb-4">
                <div class="col-lg-3 col-md-6 mb-4">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-value" id="total-spend">¥0</div>
                                <div class="stat-label">总花费</div>
                            </div>
                            <i class="bi bi-currency-dollar" style="font-size: 2rem; opacity: 0.7;"></i>
                        </div>
                        <div class="mt-3">
                            <small><span id="spend-change" class="text-success">+0%</span> 较昨日</small>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-4">
                    <div class="stat-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-value" id="total-conversions">0</div>
                                <div class="stat-label">总转化数</div>
                            </div>
                            <i class="bi bi-graph-up-arrow" style="font-size: 2rem; opacity: 0.7;"></i>
                        </div>
                        <div class="mt-3">
                            <small><span id="conversion-change" class="text-success">+0%</span> 较昨日</small>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-4">
                    <div class="stat-card" style="background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-value" id="total-clicks">0</div>
                                <div class="stat-label">总点击量</div>
                            </div>
                            <i class="bi bi-mouse" style="font-size: 2rem; opacity: 0.7;"></i>
                        </div>
                        <div class="mt-3">
                            <small><span id="click-change" class="text-success">+0%</span> 较昨日</small>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-4">
                    <div class="stat-card" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-value" id="avg-cpc">¥0</div>
                                <div class="stat-label">平均点击成本</div>
                            </div>
                            <i class="bi bi-calculator" style="font-size: 2rem; opacity: 0.7;"></i>
                        </div>
                        <div class="mt-3">
                            <small><span id="cpc-change" class="text-danger">+0%</span> 较昨日</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 图表区域 -->
            <div class="row mb-4">
                <div class="col-lg-8 mb-4">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>花费与转化趋势</span>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-secondary active" onclick="changeChartRange('today')">今日</button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="changeChartRange('yesterday')">昨日</button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="changeChartRange('week')">本周</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="spendConversionChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 mb-4">
                    <div class="card">
                        <div class="card-header">广告主分布</div>
                        <div class="card-body">
                            <div class="chart-container">
                                <canvas id="advertiserChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 数据表格 -->
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>今日小时级数据</span>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="auto-refresh" checked>
                                <label class="form-check-label" for="auto-refresh">自动刷新</label>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover data-table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>广告主</th>
                                            <th>花费</th>
                                            <th>展示量</th>
                                            <th>点击量</th>
                                            <th>点击率</th>
                                            <th>转化数</th>
                                            <th>转化成本</th>
                                            <th>状态</th>
                                        </tr>
                                    </thead>
                                    <tbody id="hourly-data-table">
                                        <!-- 数据将通过JavaScript填充 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 其他页面内容（初始隐藏） -->
        <div id="hourly-section" class="section-content" style="display: none;">
            <!-- 小时级数据页面 -->
        </div>
        
        <div id="weekly-section" class="section-content" style="display: none;">
            <!-- 周报数据页面 -->
        </div>
        
        <div id="advertisers-section" class="section-content" style="display: none;">
            <!-- 广告主分析页面 -->
        </div>
        
        <div id="campaigns-section" class="section-content" style="display: none;">
            <!-- 活动分析页面 -->
        </div>
        
        <div id="settings-section" class="section-content" style="display: none;">
            <!-- 系统设置页面 -->
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 主JavaScript文件 -->
    <script>
        // 全局变量
        let currentSection = 'dashboard';
        let autoRefreshInterval = null;
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            loadInitialData();
            updateLastUpdateTime();
            
            // 设置自动刷新
            if (document.getElementById('auto-refresh').checked) {
                startAutoRefresh();
            }
            
            // 监听自动刷新开关
            document.getElementById('auto-refresh').addEventListener('change', function() {
                if (this.checked) {
                    startAutoRefresh();
                } else {
                    stopAutoRefresh();
                }
            });
        });
        
        // 显示页面部分
        function showSection(sectionId) {
            // 隐藏所有部分
            document.querySelectorAll('.section-content').forEach(section => {
                section.style.display = 'none';
            });
            
            // 移除所有活动链接
            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                link.classList.remove('active');
            });
            
            // 显示选中部分
            document.getElementById(sectionId + '-section').style.display = 'block';
            
            // 设置活动链接
            event.target.closest('.nav-link').classList.add('active');
            
            // 更新页面标题
            const titles = {
                'dashboard': '仪表盘',
                'hourly': '小时级数据',
                'weekly': '周报数据',
                'advertisers': '广告主分析',
                'campaigns': '活动分析',
                'settings': '系统设置'
            };
            document.getElementById('page-title').textContent = titles[sectionId];
            
            currentSection = sectionId;
            
            // 加载相应数据
            if (sectionId === 'dashboard') {
                loadDashboardData();
            } else if (sectionId === 'hourly') {
                loadHourlyData();
            } else if (sectionId === 'weekly') {
                loadWeeklyData();
            }
        }
        
        // 加载初始数据
        async function loadInitialData() {
            try {
                // 检查API连接
                const healthResponse = await fetch('http://localhost:8090/api/health');
                if (!healthResponse.ok) {
                    throw new Error('API服务不可用');
                }
                
                // 加载仪表盘数据
                await loadDashboardData();
            } catch (error) {
                console.error('加载数据失败:', error);
                showError('无法连接到数据服务，请检查API是否运行');
            }
        }
        
        // 加载仪表盘数据
        async function loadDashboardData() {
            try {
                // 获取汇总数据
                const summaryResponse = await fetch('http://localhost:8090/api/summary/today');
                const summaryData = await summaryResponse.json();
                
                // 更新关键指标
                document.getElementById('total-spend').textContent = `¥${summaryData.total_spend.toFixed(2)}`;
                document.getElementById('total-conversions').textContent = summaryData.total_conversions;
                document.getElementById('total-clicks').textContent = summaryData.total_clicks;
                document.getElementById('avg-cpc').textContent = `¥${summaryData.avg_cpc.toFixed(2)}`;
                
                // 获取小时级数据
                const hourlyResponse = await fetch('http://localhost:8090/api/hourly/today');
                const hourlyData = await hourlyResponse.json();
                
                // 更新表格
                updateHourlyTable(hourlyData);
                
                // 更新图表
                updateCharts(hourlyData, summaryData);
                
                updateLastUpdateTime();
            } catch (error) {
                console.error('加载仪表盘数据失败:', error);
                // 使用模拟数据作为回退
                loadMockData();
            }
        }
        
        // 更新小时级数据表格
        function updateHourlyTable(data) {
            const tableBody = document.getElementById('hourly-data-table');
            tableBody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" class="text-center">暂无数据</td></tr>';
                return;
            }
            
            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.hour}:00</td>
                    <td>${item.advertiser_name || '--'}</td>
                    <td>¥${item.spend?.toFixed(2) || '0.00'}</td>
                    <td>${item.impressions?.toLocaleString() || '0'}</td>
                    <td>${item.clicks?.toLocaleString() || '0'}</td>
                    <td>${item.ctr ? (item.ctr * 100).toFixed(2) + '%' : '0%'}</td>
                    <td>${item.conversions || '0'}</td>
                    <td>${item.conversion_cost ? '¥' + item.conversion_cost.toFixed(2) : '--'}</td>
                    <td>
                        <span class="badge ${item.spend > 100 ? 'bg-success' : 'bg-warning'} badge-pill">
                            ${item.spend > 100 ? '良好' : '一般'}
                        </span>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        // 更新图表
        function updateCharts(hourlyData, summaryData) {
            // 花费与转化趋势图
            const spendConversionCtx = document.getElementById('spendConversionChart').getContext('2d');
            
            // 准备数据
            const hours = hourlyData.map(item => item.hour + ':00');
            const spends = hourlyData.map(item => item.spend || 0);
            const conversions = hourlyData.map(item => item.conversions || 0);
            
            new Chart(spendConversionCtx, {
                type: 'line',
                data: {
                    labels: hours,
                    datasets: [
                        {
                            label: '花费',
                            data: spends,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: '转化',
                            data: conversions,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '花费 (元)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '转化数'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        }
                    }
                }
            });
            
            // 广告主分布图
            const advertiserCtx = document.getElementById('advertiserChart').getContext('2d');
            new Chart(advertiserCtx, {
                type: 'doughnut',
                data: {
                    labels: ['广告主A', '广告主B', '广告主C', '其他'],
                    datasets: [{
                        data: [40, 30, 20, 10],
                        backgroundColor: ['#3b82f6', '#10b981', '#8b5cf6', '#f59e0b']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        // 加载模拟数据
        function loadMockData() {
            // 模拟汇总数据
            document.getElementById('total-spend').textContent = '¥1,234.56';
            document.getElementById('total-conversions').textContent = '45';
            document.getElementById('total-clicks').textContent = '1,234';
            document.getElementById('avg-cpc').textContent = '¥2.68';
            
            // 模拟小时数据
            const mockData = [];
            for (let i = 0; i < 24; i++) {
                mockData.push({
                    hour: i,
                    advertiser_name: ['NexBids', 'AdvertiserX', 'ClientY'][i % 3],
                    spend: Math.random() * 100 + 50,
                    impressions: Math.floor(Math.random() * 10000) + 1000,
                    clicks: Math.floor(Math.random() * 100) + 10,
                    ctr: Math.random() * 0.05 + 0.01,
                    conversions: Math.floor(Math.random() * 5),
                    conversion_cost: Math.random() * 20 + 5
                });
            }
            
            updateHourlyTable(mockData);
            updateCharts(mockData, {
                total_spend: 1234.56,
                total_conversions: 45,
                total_clicks: 1234,
                avg_cpc: 2.68
            });
        }
        
        // 刷新数据
        function refreshData() {
            if (currentSection === 'dashboard') {
                loadDashboardData();
            } else if (currentSection === 'hourly') {
                loadHourlyData();
            } else if (currentSection === 'weekly') {
                loadWeeklyData();
            }
            
            // 显示刷新提示
            showToast('数据已刷新', 'success');
        }
        
        // 开始自动刷新
        function startAutoRefresh() {
            stopAutoRefresh(); // 先停止现有的
            autoRefreshInterval = setInterval(refreshData, 30000); // 每30秒刷新
        }
        
        // 停止自动刷新
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }
        
        // 更新最后更新时间
        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('last-update').textContent = timeStr;
        }
        
        // 显示错误消息
        function showError(message) {
            const toast = document.createElement('div');
            toast.className = 'position-fixed top-0 end-0 p-3';
            toast.style.zIndex = '1100';
            toast.innerHTML = `
                <div class="toast show" role="alert">
                    <div class="toast-header bg-danger text-white">
                        <strong class="me-auto">错误</strong>
                        <button type="button" class="btn-close btn-close-white" onclick="this.closest('.toast').remove()"></button>
                    </div>
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;
            document.body.appendChild(toast);
            
            // 5秒后自动移除
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 5000);
        }
        
        // 显示提示消息
        function showToast(message, type = 'info') {
            const bgClass = type === 'success' ? 'bg-success' : 'bg-info';
            const toast = document.createElement('div');
            toast.className = 'position-fixed bottom-0 end-0 p-3';
            toast.style.zIndex = '1100';
            toast.innerHTML = `
                <div class="toast show" role="alert">
                    <div class="toast-header ${bgClass} text-white">
                        <strong class="me-auto">提示</strong>
                        <button type="button" class="btn-close btn-close-white" onclick="this.closest('.toast').remove()"></button>
                    </div>
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;
            document.body.appendChild(toast);
            
            // 3秒后自动移除
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.parentNode.removeChild(toast);
                }
            }, 3000);
        }
        
        // 导出数据
        function exportData(format) {
            showToast(`正在导出${format.toUpperCase()}格式数据...`, 'info');
            // 这里可以添加实际的导出逻辑
        }
        
        // 改变图表时间范围
        function changeChartRange(range) {
            const buttons = document.querySelectorAll('#spendConversionChart').closest('.card').querySelectorAll('.btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            showToast(`已切换到${range === 'today' ? '今日' : range === 'yesterday' ? '昨日' : '本周'}数据`, 'info');
        }
        
        // 加载小时级数据页面
        async function loadHourlyData() {
            try {
                const response = await fetch('http://localhost:8090/api/hourly/today');
                const data = await response.json();
                console.log('小时级数据:', data);
                // 这里可以添加小时级页面特定的逻辑
            } catch (error) {
                console.error('加载小时级数据失败:', error);
            }
        }
        
        // 加载周报数据
        async function loadWeeklyData() {
            try {
                const response = await fetch('http://localhost:8090/api/weekly/current');
                const data = await response.json();
                console.log('周报数据:', data);
                // 这里可以添加周报页面特定的逻辑
            } catch (error) {
                console.error('加载周报数据失败:', error);
            }
        }
    </script>
